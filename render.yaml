services:
  - type: web
    name: skin-analyzer-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FACEPP_KEY
        sync: false
      - key: FACEPP_SECRET
        sync: false
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true